<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tratamento de dados</title>
</head>
<body>
    
    <script>
        var n1 = Number.parseFloat(window.prompt('número 1')) //string
        var n2 = Number(window.prompt('número 2')) //string
        var soma = n1 + n2 //concatenação

        window.alert(`A soma entre ${n1} e ${n2} é igual a ${soma}`)       

        //(number + number) para adição
        //(string + string) para concatenação 
    </script>
</body>
</html>
