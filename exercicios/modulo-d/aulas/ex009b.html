<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>"Desafio"</title>
</head>
<body>
    
    <form>
        <fieldset>
            <legend>Teste de output</legend>
            <label for="iescreva">Escreva uma letra de A até E:</label>
            <input type="text" name="escreva" id="iescreva" minlength="1" maxlength="1"  oninput="letra()">
        </fieldset>
        <fieldset>
            <legend>resultado</legend>
            <output id="letraescolhida">?</output>
        </fieldset>
    </form>
    <!--Falha-->
    <script>
        function letra(){
            var output = document.getElementById('letraescolhida')
            var escreva = document.getElementById('iescreva')
            var res = new String(escreva)
            switch(res){
                case 'A':
                    output.innerText = 'Fogo'
                    break; 
                
                default:
                    break;
            }
        }
    </script>
</body>
</html>
